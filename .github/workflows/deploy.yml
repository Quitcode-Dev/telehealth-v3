name: Deploy
run-name: Automatron ${{ inputs.action }} / ${{ inputs.automatron_run_id }}

on:
  workflow_dispatch:
    inputs:
      action:
        type: choice
        options:
          - setup
          - deploy
          - rollback
        required: true
        default: deploy
      rollback_to:
        type: string
        required: false
      automatron_run_id:
        type: string
        required: true


permissions:
  contents: read
  packages: write

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Kamal
        run: gem install kamal -v 2.4.0

      - name: Write Kamal secrets
        env:
          KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        run: |
          mkdir -p .kamal
          : > .kamal/secrets
          printf 'KAMAL_REGISTRY_PASSWORD=%s\n' "$KAMAL_REGISTRY_PASSWORD" >> .kamal/secrets
          printf 'DATABASE_URL=%s\n' "$DATABASE_URL" >> .kamal/secrets
          printf 'NEXTAUTH_SECRET=%s\n' "$NEXTAUTH_SECRET" >> .kamal/secrets
          printf 'NEXTAUTH_URL=%s\n' "$NEXTAUTH_URL" >> .kamal/secrets

      - name: SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.KAMAL_SSH_PRIVATE_KEY }}

      - name: Run Kamal action
        env:
          ACTION: ${{ inputs.action || 'deploy' }}
          ROLLBACK_TO: ${{ inputs.rollback_to }}
        run: |
          set -euo pipefail
          run_kamal() {
            case "$ACTION" in
              setup)
                kamal setup
                ;;
              deploy)
                kamal deploy
                ;;
              rollback)
                if [ -z "$ROLLBACK_TO" ]; then
                  echo "rollback_to input is required for rollback action" >&2
                  return 1
                fi
                kamal rollback "$ROLLBACK_TO"
                ;;
              *)
                echo "Unknown action: $ACTION" >&2
                return 1
                ;;
            esac
          }

          # Retry transient SSH/network failures for setup/deploy.
          # Rollback remains single-attempt to avoid repeated destructive actions.
          max_attempts=2
          delay_seconds=20
          if [ "$ACTION" = "rollback" ]; then
            max_attempts=1
          fi

          attempt=1
          while true; do
            echo "Kamal action '$ACTION' attempt $attempt/$max_attempts"
            if run_kamal; then
              break
            fi
            rc=$?
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Kamal action failed after $attempt attempt(s)" >&2
              exit "$rc"
            fi
            attempt=$((attempt + 1))
            echo "Kamal action failed with exit code $rc, retrying in ${delay_seconds}s..."
            sleep "$delay_seconds"
          done
