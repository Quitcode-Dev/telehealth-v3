# Kamal deployment configuration — generated by Automatron.
# Do not edit by hand. Re-run "Generate artifacts" in Automatron to update.

service: telehealth-v3
image: quitcode-dev/telehealth-v3

builder:
  arch:
    - amd64
    - arm64

servers:
  web:
    - 91.98.68.42

registry:
  server: ghcr.io
  username: Quitcode-Dev
  password:
    - KAMAL_REGISTRY_PASSWORD

ssh:
  user: root
  port: 22

sshkit:
  pool_idle_timeout: 1800

proxy:
  ssl: true
  host: telehealthv3.duckdns.org
  app_port: 3000
  response_timeout: 30
  healthcheck:
    path: /api/health
    interval: 3
    timeout: 10
    max_attempts: 10

env:
  clear:
    NODE_ENV: production
    PORT: "3000"
    HOSTNAME: "0.0.0.0"
  secret:
    - DATABASE_URL
    - NEXTAUTH_SECRET
    - NEXTAUTH_URL
